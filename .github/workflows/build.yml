name: Build packages

# required for trusted publishing to prefix.dev
permissions:
  id-token: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      server:
        description: 'Upload server'
        required: true
        type: choice
        options:
          - prefix
          - anaconda
      package:
        description: 'Package to build (e.g. osm2pgsql, tippecanoe)'
        required: true
        type: string

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      recipes: ${{ steps.changed.outputs.recipes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed recipe directories
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RECIPES='["${{ inputs.package }}"]'
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            RECIPES=$(git diff --name-only "$BASE" HEAD \
              | cut -d/ -f1 \
              | sort -u \
              | while read dir; do
                  if [ -f "$dir/recipe.yaml" ]; then echo "$dir"; fi
                done \
              | jq -R . | jq -sc .)
          else
            BASE=$(git rev-parse HEAD^)
            RECIPES=$(git diff --name-only "$BASE" HEAD \
              | cut -d/ -f1 \
              | sort -u \
              | while read dir; do
                  if [ -f "$dir/recipe.yaml" ]; then echo "$dir"; fi
                done \
              | jq -R . | jq -sc .)
          fi
          echo "recipes=$RECIPES" >> $GITHUB_OUTPUT
          echo "Changed recipes: $RECIPES"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.recipes != '[]'
    strategy:
      fail-fast: false
      matrix:
        recipe: ${{ fromJson(needs.detect-changes.outputs.recipes) }}
        platform:
          - target: linux-64
            os: ubuntu-latest
            variant_config: variants.linux-64.yaml

          # linux-aarch64 support is currently limited
          # - target: linux-aarch64
          #   os: ubuntu-24.04-arm
          #   variant_config: variants.linux_aarch64.yaml

          - target: win-64
            os: windows-latest
            variant_config: variants.win-64.yaml

          - target: osx-arm64
            os: macos-14
            variant_config: variants.osx_arm-64.yaml

    name: ${{ matrix.recipe }} (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.63.2

      - name: Add pixi env to PATH
        shell: bash
        run: echo "$(pwd)/.pixi/envs/default/bin" >> $GITHUB_PATH

      - name: Check variant config exists
        id: check_variant
        shell: bash
        run: |
          if [ -f "${{ matrix.recipe }}/${{ matrix.platform.variant_config }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Skipping: ${{ matrix.recipe }}/${{ matrix.platform.variant_config }} not found"
          fi

      - name: Build recipe
        if: steps.check_variant.outputs.exists == 'true'
        shell: bash
        run: |
          SKIP_FLAG="--skip-existing=all"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && SKIP_FLAG=""
          rattler-build build \
            --recipe-dir ${{ matrix.recipe }} \
            $SKIP_FLAG \
            --target-platform=${{ matrix.platform.target }} \
            -c conda-forge \
            -c https://prefix.dev/gis-forge \
            --variant-config=${{ matrix.recipe }}/${{ matrix.platform.variant_config }}

      - name: Publish to prefix.dev
        if: steps.check_variant.outputs.exists == 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.server == 'prefix'))
        shell: bash
        run: |
          found=0
          while IFS= read -r -d '' file; do
            found=1
            rattler-build upload prefix -c gis-forge "$file"
          done < <(find output -name "*.conda" -print0)
          [ "$found" -eq 0 ] && echo "No .conda files to upload (all packages already exist)"

      - name: Publish to anaconda.org
        if: steps.check_variant.outputs.exists == 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.server == 'anaconda'))
        shell: bash
        env:
          ANACONDA_API_KEY: ${{ secrets.ANACONDA_API_KEY }}
        run: |
          FORCE_FLAG=""
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && FORCE_FLAG="--force"
          found=0
          while IFS= read -r -d '' file; do
            found=1
            rattler-build upload anaconda -o gis-forge $FORCE_FLAG "$file"
          done < <(find output -name "*.conda" -print0)
          [ "$found" -eq 0 ] && echo "No .conda files to upload (all packages already exist)"
